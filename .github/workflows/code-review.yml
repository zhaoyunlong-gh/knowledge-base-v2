name: AI Code Review with MiniMax

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  pull-requests: write

jobs:
  review:
    name: Review
    runs-on: ubuntu-latest
    steps:
      - name: Code Review
        uses: tarmojussila/minimax-code-review@v0.4.0
        with:
          MINIMAX_API_KEY: ${{ secrets.LLM_API_KEY }}
